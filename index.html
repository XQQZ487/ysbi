let answers = Array(24).fill(null);

// 获取评分等级
function getScoreLevel(score) {
    if (score >= scoreLevel.low.min && score <= scoreLevel.low.max) return scoreLevel.low;
    if (score >= scoreLevel.mid.min && score <= scoreLevel.mid.max) return scoreLevel.mid;
    return scoreLevel.high;
}

// 四维评分中医解读
function getScoreDesc(type, level) {
    const descMap = {
        score1: { // 作息
            low: "中医：熬夜耗伤阴血，肝肾阴虚，易口干、失眠",
            mid: "中医：作息轻度紊乱，阴液略亏，精力易透支",
            high: "中医：作息规律，阴血充足，肝肾功能正常"
        },
        score2: { // 体态
            low: "中医：久坐致气滞血瘀，肩颈腰易酸痛，循环不畅",
            mid: "中医：活动不足，气血运行稍缓，肢体偶有麻木",
            high: "中医：活动适度，气血通畅，肢体舒展"
        },
        score3: { // 饮食
            low: "中医：饮食重口致痰湿内生，肠胃紊乱，皮肤出油",
            mid: "中医：饮食轻度失衡，痰湿初生，偶有腹胀",
            high: "中医：饮食清淡，脾胃功能正常，无痰湿困扰"
        },
        score4: { // 精神
            low: "中医：情绪内耗致肝郁气滞，易焦虑、胸闷、失眠",
            mid: "中医：情绪轻度敏感，肝气略郁，偶有烦躁",
            high: "中医：情绪稳定，肝气条达，心态平和"
        }
    };
    return descMap[type][level === "差" ? "low" : level === "中" ? "mid" : "high"];
}

function startTest() {
    document.getElementById("start-page").classList.add("hidden");
    document.getElementById("test-page").classList.remove("hidden");
    renderQuestion();
}

function renderQuestion() {
    const q = questions[current];
    document.getElementById("question-text").innerText = `${current + 1}. ${q}`;
    document.getElementById("progress-text").innerText = `${current + 1}/24`;
    document.getElementById("progress-bar").style.width = `${((current + 1)/24)*100}%`;
    
    const box = document.getElementById("options-box");
    box.innerHTML = "";
    const opts = ["A. 非常符合我", "B. 比较符合我", "C. 不太符合我", "D. 完全不符合我"];
    opts.forEach((text, idx) => {
        const div = document.createElement("div");
        div.className = "p-3 border rounded-lg cursor-pointer hover:bg-primary/10 transition-all";
        div.innerText = text;
        if (answers[current] === idx + 1) {
            div.classList.add("bg-primary/20", "border-primary");
        }
        div.onclick = () => {
            answers[current] = idx + 1;
            document.querySelectorAll("#options-box div").forEach(d => {
                d.classList.remove("bg-primary/20", "border-primary");
            });
            div.classList.add("bg-primary/20", "border-primary");
            if (current > 0) {
                document.getElementById("prev-btn").classList.remove("opacity-50", "cursor-not-allowed");
                document.getElementById("prev-btn").disabled = false;
            }
        };
        box.appendChild(div);
    });

    if (current === 0) {
        document.getElementById("prev-btn").classList.add("opacity-50", "cursor-not-allowed");
        document.getElementById("prev-btn").disabled = true;
    } else {
        document.getElementById("prev-btn").classList.remove("opacity-50", "cursor-not-allowed");
        document.getElementById("prev-btn").disabled = false;
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        renderQuestion();
    }
}

function nextQuestion() {
    if (answers[current] == null) {
        alert("请选择一个选项后继续～");
        return;
    }
    current++;
    if (current < 24) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    // 计算四个维度得分
    const score1 = answers[0] + answers[5] + answers[9] + answers[13] + answers[18] + answers[23]; // 作息
    const score2 = answers[2] + answers[6] + answers[10] + answers[14] + answers[19] + answers[22]; // 体态
    const score3 = answers[1] + answers[4] + answers[8] + answers[12] + answers[17] + answers[21]; // 饮食
    const score4 = answers[3] + answers[7] + answers[11] + answers[15] + answers[16] + answers[20]; // 精神

    // 判定评分等级
    const level1 = getScoreLevel(score1);
    const level2 = getScoreLevel(score2);
    const level3 = getScoreLevel(score3);
    const level4 = getScoreLevel(score4);

    // 生成人格代码
    const M = score1 > 16 ? "M" : "N";
    const P = score2 > 16 ? "P" : "Q";
    const U = score3 > 16 ? "U" : "V";
    const W = score4 > 16 ? "W" : "X";
    const code = M + P + U + W;
    
    // 获取人格信息
    const personality = personalityMap[code] || {
        name: "普通健康青年",
        tcmType: "平和质偏失衡",
        tcmColor: "#DD6B20",
        tcmDesc: "中医认为你属于平和质偏轻度失衡，有部分不良习惯导致体质略有偏差，但整体问题不大。",
        diet: "保持饮食均衡，减少重口、生冷食物摄入，多吃应季蔬果。",
        life: "规律作息，每天保持适量运动，避免久坐不动。",
        acup: "日常按揉足三里穴，每次1分钟，调理脾胃功能。",
        mood: "保持情绪稳定，避免过度焦虑，培养轻松的生活状态。"
    };

    // 渲染结果
    document.getElementById("test-page").classList.add("hidden");
    document.getElementById("result-page").classList.remove("hidden");
    
    // 核心信息
    document.getElementById("result-code").innerText = code;
    document.getElementById("result-name").innerText = personality.name;
    document.getElementById("tcm-type").innerText = personality.tcmType;
    document.getElementById("tcm-type").style.backgroundColor = personality.tcmColor;
    
    // 四维评分
    document.getElementById("score1").innerText = score1;
    document.getElementById("score1-tag").innerText = level1.tag;
    document.getElementById("score1-tag").style.backgroundColor = level1.color;
    document.getElementById("score1-desc").innerText = getScoreDesc("score1", level1.tag);

    document.getElementById("score2").innerText = score2;
    document.getElementById("score2-tag").innerText = level2.tag;
    document.getElementById("score2-tag").style.backgroundColor = level2.color;
    document.getElementById("score2-desc").innerText = getScoreDesc("score2", level2.tag);

    document.getElementById("score3").innerText = score3;
    document.getElementById("score3-tag").innerText = level3.tag;
    document.getElementById("score3-tag").style.backgroundColor = level3.color;
    document.getElementById("score3-desc").innerText = getScoreDesc("score3", level3.tag);

    document.getElementById("score4").innerText = score4;
    document.getElementById("score4-tag").innerText = level4.tag;
    document.getElementById("score4-tag").style.backgroundColor = level4.color;
    document.getElementById("score4-desc").innerText = getScoreDesc("score4", level4.tag);

    // 中医分析+养生建议
    document.getElementById("tcm-desc").innerText = personality.tcmDesc;
    document.getElementById("diet-sug").innerText = personality.diet;
    document.getElementById("life-sug").innerText = personality.life;
    document.getElementById("acup-sug").innerText = personality.acup;
    document.getElementById("mood-sug").innerText = personality.mood;
}
